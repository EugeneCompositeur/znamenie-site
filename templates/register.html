{% extends 'base.html' %}
{% block content %}
<section class="card auth-form">
  <h2>Регистрация по приглашению</h2>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Код приглашения<input name="invite_code" required></label>
    <label>Email<input name="email" type="email" required></label>
    <label>Имя<input name="first_name" required></label>
    <label>Фамилия<input name="last_name" required></label>
    <label>Пароль<input name="password" type="password" minlength="8" required></label>
    <label>Повтор пароля<input name="password_confirm" type="password" minlength="8" required></label>
    <button class="btn" type="submit">Зарегистрироваться</button>
  </form>
</section>
{% endblock %}
